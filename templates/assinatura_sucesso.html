<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso | ADVtools Sign</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-card {
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background-color: #d1e7dd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .icon-circle i {
            color: #198754;
            font-size: 3rem;
        }
    </style>
</head>

<body>
    <div class="success-card">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>
        <h2 class="fw-bold mb-3 text-success">Assinatura Confirmada!</h2>
        <p class="text-muted mb-4">Obrigado. Registramos sua assinatura com sucesso. O documento assinado já está
            disponível.</p>
        <div class="d-grid gap-2">
            <a href="/assinatura/baixar/{{ token }}" class="btn btn-primary mb-2">
                <i class="fas fa-file-download me-2"></i> Baixar Documento Assinado
            </a>
            <button onclick="window.close()" class="btn btn-outline-secondary">Fechar Janela</button>
        </div>
    </div>
</body>

</html>
