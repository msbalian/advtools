# ══════════════════════════════════════════════════════════════════════════════
# advtools — Configuração Nginx
# Arquivo: /etc/nginx/sites-available/advtools
# ══════════════════════════════════════════════════════════════════════════════

# ── Frontend: app.advtools.com.br ─────────────────────────────────────────────
server {
    listen 80;
    server_name app.advtools.com.br;

    # Redireciona todo HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.advtools.com.br;

    ssl_certificate     /etc/letsencrypt/live/app.advtools.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.advtools.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Pasta onde o GitHub Actions vai depositar o build do Vue.js
    root /var/www/advtools/advtools-web/dist;
    index index.html;

    # Necessário para Vue Router funcionar (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy: Rotear as chamadas do frontend /api para o backend Docker
    location /api/ {
        # O backend Docker já resolve a rota /api/ internamente
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para chamadas à Gemini/Datajud
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Cabeçalhos de segurança
    # camera=(self) permite câmera apenas para o próprio domínio (necessário para ADVtools Sign - selfie)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
}

# ── API: api.advtools.com.br ──────────────────────────────────────────────────
server {
    listen 80;
    server_name api.advtools.com.br;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.advtools.com.br;

    ssl_certificate     /etc/letsencrypt/live/api.advtools.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.advtools.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout generoso para chamadas à Gemini/Datajud que podem demorar
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Cabeçalhos de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
