<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | ADVtools Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0F172A;
            /* Azul Noturno (Igual Sidebar) */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Remove scrollbars da janela principal */
            position: relative;
        }

        /* Elemento de Fundo Decorativo */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            z-index: 0;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            /* Fundo Glass */
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            /* Permite scroll se a tela for pequena */
            max-height: 90vh;
            overflow-y: auto;
        }

        .brand-text {
            color: white;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .brand-text span {
            color: #F59E0B;
        }

        /* Gold */

        .form-floating>.form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-floating>.form-control:focus {
            background-color: rgba(15, 23, 42, 0.9);
            border-color: #F59E0B;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            color: white;
        }

        .form-floating>label {
            color: #94A3B8;
        }

        .btn-prime {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            color: white;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            color: white;
        }

        .section-title {
            color: #F59E0B;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* Scrollbar customizada para o card */
        .login-card::-webkit-scrollbar {
            width: 5px;
        }

        .login-card::-webkit-scrollbar-thumb {
            background: #64748B;
            border-radius: 5px;
        }

        .login-card::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <div class="brand-text"><i class="fas fa-scale-balanced me-2 text-warning"></i>ADV<span>TOOLS</span></div>
            <p class="text-white opacity-75 small">Crie sua conta e modernize seu escritório hoje.</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger py-2 small bg-danger bg-opacity-25 text-light border-0 mb-4">
            <i class="fas fa-exclamation-triangle me-1"></i> {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/cadastro">

            <!-- DADOS DO ESCRITÓRIO -->
            <div class="section-title">Dados do Escritório</div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" name="nome_escritorio" id="nome_escritorio"
                    placeholder="Nome do Escritório" required>
                <label for="nome_escritorio">Nome do Escritório</label>
            </div>

            <div class="form-floating mb-4">
                <input type="text" class="form-control mask-document" name="documento_escritorio"
                    id="documento_escritorio" placeholder="CNPJ ou CPF (Opcional)">
                <label for="documento_escritorio">CNPJ ou CPF (Opcional)</label>
            </div>

            <!-- DADOS DO ADMINISTRADOR -->
            <div class="section-title">Seu Acesso (Admin)</div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" name="nome_admin" id="nome_admin"
                    placeholder="Seu Nome Completo" required>
                <label for="nome_admin">Seu Nome Completo</label>
            </div>

            <div class="form-floating mb-3">
                <input type="email" class="form-control" name="email_admin" id="email_admin" placeholder="Seu Email"
                    required>
                <label for="email_admin">Seu Email (Login)</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" name="senha_admin" id="senha_admin"
                    placeholder="Senha Forte" required>
                <label for="senha_admin">Crie uma Senha</label>
            </div>

            <button type="submit" class="btn btn-prime py-3 rounded-3 fs-5 mb-3">
                CRIAR CONTA & ENTRAR
            </button>

            <div class="text-center">
                <a href="/login" class="text-decoration-none small text-muted hover-light">
                    Já tem uma conta? <span class="text-white">Faça Login</span>
                </a>
            </div>

        </form>
    </div>

    <script src="{{ url_for('static', filename='js/input-masks.js') }}"></script>
</body>

</html>
