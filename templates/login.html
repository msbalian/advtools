<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ADVtools Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0F172A;
            /* Azul Noturno (Igual Sidebar) */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Elemento de Fundo Decorativo */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            top: -25%;
            left: -25%;
            z-index: 0;
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1);
            }
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            /* Fundo Glass */
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .brand-text {
            color: white;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .brand-text span {
            color: #F59E0B;
        }

        /* Gold */

        .form-floating>.form-control {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }

        .form-floating>.form-control:focus {
            background-color: rgba(15, 23, 42, 0.9);
            border-color: #F59E0B;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            color: white;
        }

        .form-floating>label {
            color: #94A3B8;
        }

        .btn-prime {
            background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
            color: white;
            font-weight: 600;
            width: 100%;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            color: white;
        }

        .footer-text {
            color: #64748B;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>

    <div class="login-card text-center">
        <div class="mb-5">
            <img src="{{ url_for('static', filename='img/logo_advtools.png') }}" alt="ADVtools" class="img-fluid"
                style="max-height: 80px;">
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger py-2 small bg-danger bg-opacity-25 text-light border-0 mb-4">
            <i class="fas fa-exclamation-triangle me-1"></i> {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" name="usuario" id="usuario" placeholder="Usuário" required>
                <label for="usuario">Usuário ou Email</label>
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" name="senha" id="senha" placeholder="Senha" required>
                <label for="senha">Senha de Acesso</label>
            </div>

            <div class="text-end mb-4">
                <a href="/esqueci-senha" class="text-primary text-decoration-none small">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn btn-prime py-3 rounded-3 fs-5">
                ACESSAR SISTEMA
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/cadastro" class="text-warning text-decoration-none fw-bold small hover-effect">
                <i class="fas fa-plus-circle me-1"></i> AINDA NÃO TEM CONTA? CRIE AGORA
            </a>
        </div>

        <div class="mt-5 footer-text">
            &copy; 2026 ADVtools Technology<br>
            Ambiente Seguro & Criptografado
        </div>
    </div>

</body>

</html>
