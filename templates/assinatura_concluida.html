<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assinatura Concluída</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }

        .icon {
            font-size: 3em;
            color: #16a34a;
            margin-bottom: 20px;
        }

        h1 {
            color: #0f172a;
            margin: 0 0 10px 0;
        }

        p {
            color: #64748b;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Assinatura Recebida!</h1>
        <p>Obrigado, <strong>{{ sig['nome'] }}</strong>.</p>
        <p>Sua assinatura foi registrada com sucesso e o certificado de auditoria será gerado assim que todos os
            signatários concluírem.</p>
        <p style="font-size: 0.9em; margin-top: 30px;">Você pode fechar esta janela agora.</p>
    </div>
</body>

</html>
