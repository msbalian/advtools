<!-- Modal Editar Serviço -->
<div class="modal fade" id="modalEditarServico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Editar Serviço</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form action="/servicos/atualizar" method="POST">
                    <input type="hidden" name="servico_id" id="edit_servico_id">
                    <input type="hidden" name="cliente_id" value="{{ cliente.id }}">

                    <div class="mb-3">
                        <label class="form-label">Descrição / Processo</label>
                        <textarea name="descricao" id="edit_descricao" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Valor Total (R$)</label>
                            <input type="number" step="0.01" name="valor_total" id="edit_valor" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Qtd Parcelas</label>
                            <input type="number" name="qtd_parcelas" id="edit_parcelas" class="form-control">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Forma de Pagamento</label>
                        <input type="text" name="forma_pagamento" id="edit_forma" class="form-control"
                            list="listaFormasEdit">
                        <datalist id="listaFormasEdit">
                            <option value="À Vista">
                            <option value="Parcelado (Boleto)">
                            <option value="Parcelado (Cartão)">
                            <option value="Mensalidade">
                            <option value="Êxito (Ao Final)">
                        </datalist>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Detalhes do Pagamento</label>
                        <input type="text" name="detalhes_pagamento" id="edit_detalhes" class="form-control">
                    </div>

                    <div class="text-end">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var editBtns = document.querySelectorAll('.btn-editar-servico');
        editBtns.forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                var id = this.getAttribute('data-id');
                var desc = this.getAttribute('data-descricao');
                var valor = this.getAttribute('data-valor');
                var forma = this.getAttribute('data-forma');
                var detalhes = this.getAttribute('data-detalhes');
                var parcelas = this.getAttribute('data-parcelas');

                document.getElementById('edit_servico_id').value = id;
                document.getElementById('edit_descricao').value = desc;
                document.getElementById('edit_valor').value = valor;
                document.getElementById('edit_forma').value = forma;
                document.getElementById('edit_detalhes').value = detalhes;
                document.getElementById('edit_parcelas').value = parcelas;

                var modal = new bootstrap.Modal(document.getElementById('modalEditarServico'));
                modal.show();
            });
        });
    });
</script>
