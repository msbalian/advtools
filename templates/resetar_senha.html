<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha | ADVtools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card-login {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .btn-primary {
            background-color: #198754;
            border: none;
            padding: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="card card-login p-4 bg-white">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-dark"><i class="fas fa-key me-2 text-success"></i>Nova Senha</h4>
            <p class="text-muted small">Crie uma nova senha para sua conta.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} small">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small text-muted">Nova Senha</label>
                <input type="password" name="senha" class="form-control" required placeholder="Nova senha">
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted">Confirmar Nova Senha</label>
                <input type="password" name="confirmacao" class="form-control" required placeholder="Confirme a senha">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3">Alterar Senha</button>
        </form>
    </div>
</body>

</html>
